services:
  db:
    image: postgres:16-alpine
    container_name: tareas_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-tareas}
      - POSTGRES_USER=${DB_USER:-tareas}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-tareas}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tareas} -d ${DB_NAME:-tareas}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      args:
        http_proxy: ${HTTP_PROXY:-}
        https_proxy: ${HTTPS_PROXY:-}
    container_name: tareas_app
    ports:
      - "${APP_PORT:-5000}:5006"
    volumes:
      - ./media:/app/media
      - ./backups:/app/backups
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-10.25.1.131,localhost}
      - DJANGO_CSRF_TRUSTED_ORIGINS=${DJANGO_CSRF_TRUSTED_ORIGINS:-http://10.25.1.131}
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-tareas}
      - DB_USER=${DB_USER:-tareas}
      - DB_PASSWORD=${DB_PASSWORD:-tareas}
      - DB_PORT=5432
      - DJANGO_SUPERUSER_USERNAME=hades
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-Death123*}
      - DJANGO_SUPERUSER_EMAIL=admin@example.com
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
