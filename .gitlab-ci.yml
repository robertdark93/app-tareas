stages:
  - test

check_python:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install --upgrade pip -q
    - pip install -r requirements.txt -q
  script:
    - echo "Verificando sintaxis Python..."
    - python -m py_compile manage.py
    - python -m py_compile tareas_project/settings.py
    - python -m py_compile tareas_project/urls.py
    - python -m py_compile tareas_project/wsgi.py
    - python -m py_compile tareas_project/asgi.py
    - find core -name "*.py" -exec python -m py_compile {} \;
    - echo "Verificando migraciones..."
    - python manage.py makemigrations --check --dry-run
  timeout: 5 minutes
