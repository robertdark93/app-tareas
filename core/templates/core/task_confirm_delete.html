{% extends 'core/base.html' %}
{% block title %}Eliminar Tarea{% endblock %}
{% block content %}
<div class="confirm-delete">
    <h1>🗑️ Eliminar Tarea</h1>
    <p>¿Estás seguro de que deseas eliminar la tarea "<strong>{{ object.titulo }}</strong>"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'task_detail' object.id %}" class="btn">Cancelar</a>
    </form>
</div>
{% endblock %}
